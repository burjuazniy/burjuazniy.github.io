<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Burjuy WebApp</title>

    <script src="jquery-3.6.3.min.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
</head>
<body>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Raleway:wght@400;600;900&display=swap');

        * {
            padding: 0;
            margin: 0;
            color: var(--tg-theme-text-color);
        }

        body {
            background-color: var(--tg-theme-bg-color);
            font-family: 'Raleway', sans-serif;
        }

        header {
            height: 3em;
            line-height: 3em;
            text-align: center;

            font-size: 1.5em;
        }

        main {
            padding: 0 5% 0 5%;
            border-radius: 2em;
            background-color: var(--th-theme-secondary-bg-color);
        }

        small {
            color: var(--tg-theme-hint-color);
        }

        #submit {
            position: fixed;
            bottom: 0;
            display: block;

            height: 2em;
            width: 100%;
            line-height: 2em;
            text-align: center;
            
            border-color: var(--tg-theme-button-color);

            background-color: var(--tg-theme-button-color);
            color: var(--th-theme-button-text-color);
        }

        #submit:hover {
            background-color: var(--tg-theme-secondary-g-color);
            transition: background-color .2s ease;
        }
      
    </style>
    <header>Burjuy WebApp</header>
    <main>
        <form id="form">
            <div class="mb-3">

                <label for="user_name" class="form-label">ПІБ</label>
                <input type="text"
                    class="form-control" name="user_name" id="user_name" aria-describedby="helpId1" placeholder="Василенко Василь Васильович">
                <small id="helpId1" class="form-text text-muted">Введіть прізвище, ім'я та по-батькові</small>
      
                </div>

            <div class="mb-3">
    
                <label for="user_phone" class="form-label">Номер телефону</label>
                <input type="text"
                class="form-control" name="user_phone" id="user_phone" aria-describedby="helpId2" placeholder="+380000000000">
                <small id="helpId2" class="form-text text-muted">Введіть номер телефону</small>
    
            </div>

        </form>
    </main>
    <button id="submit">Підвердити</button>

    <script>
        let tg = window.Telegram.WebApp;
        let submit = $("#submit");
        tg.expand();

        submit.addEventListener("click", () => {
            let name = $("#user_name").value;
            let phone = $("#user_phone").value;

            let data = {
                name: name,
                phone: phone
            }
            tg.sendData(JSON.stringify(data));

            tg.close();
        });
        
    </script>
</body>
</html>
